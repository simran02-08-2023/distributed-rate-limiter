spring:
  application:
    name: distributed-rate-limiter
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

server:
  port: 8080

rate-limiter:
  default:
    capacity: 100
    refill-rate: 10
  tiers:
    premium:
      capacity: 1000
      refill-rate: 100
    free:
      capacity: 20
      refill-rate: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics